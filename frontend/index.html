<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentPass — AI Agent Identity & Access Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#09090b;--surface:#111113;--surface2:#18181b;--surface3:#1f1f23;
--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
--tx:#fafafa;--tx2:#a1a1aa;--tx3:#71717a;--tx4:#3f3f46;
--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
--green:#22c55e;--green-dim:rgba(34,197,94,0.12);
--red:#ef4444;--red-dim:rgba(239,68,68,0.12);
--orange:#f59e0b;--orange-dim:rgba(245,158,11,0.12);
--purple:#a855f7;--purple-dim:rgba(168,85,247,0.12);
--cyan:#06b6d4;--cyan-dim:rgba(6,182,212,0.12);
--radius:12px;--radius-sm:8px;--radius-xs:4px;
--font:'Instrument Sans','Noto Sans SC',-apple-system,sans-serif;
--mono:'IBM Plex Mono','SF Mono',monospace;
--ease:cubic-bezier(0.16,1,0.3,1);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--font);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px}

.root{height:100vh;display:flex;flex-direction:column}

nav{height:48px;flex-shrink:0;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface)}
nav .brand{font-size:15px;font-weight:700;letter-spacing:-0.03em}
nav .brand b{color:var(--blue)}
nav .nav-right{margin-left:auto;display:flex;align-items:center;gap:16px;font-size:11px;color:var(--tx3)}
nav .status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
nav .status-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
nav .stat{display:flex;align-items:center;gap:4px}
nav .stat-val{font-weight:700;color:var(--tx2);font-family:var(--mono);font-size:11px}

.main{flex:1;display:flex;overflow:hidden;min-height:0}

.sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface)}
.sidebar-section{padding:16px}
.sidebar-section+.sidebar-section{border-top:1px solid var(--border)}
.sidebar-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--tx3);margin-bottom:10px}

.scenario-list{display:flex;flex-direction:column;gap:4px}
.scenario-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;background:transparent;color:var(--tx2);font-family:var(--font);font-size:12px;font-weight:500;transition:all 0.2s var(--ease);text-align:left;width:100%}
.scenario-btn:hover{background:var(--surface2);color:var(--tx)}
.scenario-btn.active{background:var(--blue-dim);border-color:rgba(59,130,246,0.2);color:var(--blue)}
.scenario-btn .s-icon{font-size:16px;flex-shrink:0;width:24px;text-align:center}
.scenario-btn .s-info{flex:1;min-width:0}
.scenario-btn .s-name{font-weight:600;display:block}
.scenario-btn .s-desc{font-size:10px;color:var(--tx3);display:block;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scenario-btn.active .s-desc{color:rgba(59,130,246,0.7)}

.agent-card{padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface2);margin-bottom:6px;border:1px solid var(--border)}
.agent-card .ac-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.agent-card .ac-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.agent-card .ac-name{font-size:12px;font-weight:700}
.agent-card .ac-id{font-size:9px;color:var(--tx4);font-family:var(--mono)}
.agent-card .ac-caps{display:flex;flex-wrap:wrap;gap:3px}
.agent-card .ac-cap{font-size:8px;padding:2px 6px;border-radius:100px;font-family:var(--mono);font-weight:500}
.agent-card .ac-risk{display:flex;align-items:center;gap:4px;margin-top:6px;font-size:9px}
.agent-card .ac-risk .risk-bar{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.agent-card .ac-risk .risk-fill{height:100%;border-radius:2px;transition:width 0.6s var(--ease)}
.agent-card .ac-risk .risk-val{font-family:var(--mono);font-weight:600;min-width:20px;text-align:right}

.center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.stage{flex:1;position:relative;overflow:hidden;min-height:0}
.stage-inner{position:absolute;inset:0;display:flex;flex-direction:column}

.stage-header{flex-shrink:0;padding:20px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.stage-header h1{font-size:20px;font-weight:700;letter-spacing:-0.02em;line-height:1.2}
.stage-header h1 .hl{color:var(--blue)}
.stage-header .stage-badge{font-size:10px;padding:4px 10px;border-radius:100px;font-weight:600;flex-shrink:0;margin-top:2px}
.stage-desc{font-size:12px;color:var(--tx3);margin-top:4px;padding:0 28px;max-width:560px;line-height:1.5}

.flow-area{flex:1;padding:16px 28px;overflow-y:auto;min-height:0}
.flow-steps{display:flex;flex-direction:column;gap:8px}
.flow-step{display:flex;gap:12px;align-items:flex-start;opacity:0.3;transform:translateX(-8px);transition:all 0.4s var(--ease)}
.flow-step.visible{opacity:1;transform:translateX(0)}
.flow-step.active{opacity:1;transform:translateX(0)}
.flow-step .step-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:28px}
.flow-step .step-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--tx4);background:var(--bg);flex-shrink:0;transition:all 0.3s var(--ease);z-index:1}
.flow-step.active .step-dot{border-color:var(--blue);background:var(--blue);box-shadow:0 0 12px rgba(59,130,246,0.5)}
.flow-step.success .step-dot{border-color:var(--green);background:var(--green);box-shadow:0 0 12px rgba(34,197,94,0.5)}
.flow-step.error .step-dot{border-color:var(--red);background:var(--red);box-shadow:0 0 12px rgba(239,68,68,0.5)}
.flow-step.warning .step-dot{border-color:var(--orange);background:var(--orange);box-shadow:0 0 12px rgba(245,158,11,0.5)}
.flow-step .step-connector{width:1px;flex:1;min-height:16px;background:var(--border);transition:background 0.3s}
.flow-step.success .step-connector{background:rgba(34,197,94,0.3)}
.flow-step.error .step-connector{background:rgba(239,68,68,0.3)}
.flow-step .step-content{flex:1;padding-bottom:4px}
.flow-step .step-title{font-size:12px;font-weight:600;color:var(--tx3);transition:color 0.3s}
.flow-step.active .step-title{color:var(--tx)}
.flow-step.success .step-title{color:var(--green)}
.flow-step.error .step-title{color:var(--red)}
.flow-step.warning .step-title{color:var(--orange)}
.flow-step .step-desc{font-size:11px;color:var(--tx4);margin-top:2px;line-height:1.4}
.flow-step.active .step-desc,.flow-step.success .step-desc,.flow-step.error .step-desc,.flow-step.warning .step-desc{color:var(--tx3)}
.flow-step .step-detail{margin-top:8px;overflow:hidden;transition:max-height 0.4s var(--ease),opacity 0.3s;max-height:0;opacity:0}
.flow-step.active .step-detail,.flow-step.success .step-detail,.flow-step.error .step-detail{max-height:600px;opacity:1}

.token-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-top:4px}
.token-card .tc-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:100px;margin-bottom:8px}
.token-card .tc-status.issued{background:var(--green-dim);color:var(--green)}
.token-card .tc-status.blocked{background:var(--red-dim);color:var(--red)}
.token-card .tc-status.warning{background:var(--orange-dim);color:var(--orange)}
.token-card .tc-status.stolen{background:var(--purple-dim);color:var(--purple)}
.jwt-parts{display:flex;gap:4px;margin-bottom:8px}
.jwt-part{flex:1;padding:6px 8px;border-radius:var(--radius-xs);font-family:var(--mono);font-size:8px}
.jwt-part.hdr{background:var(--blue-dim);border-left:2px solid var(--blue)}
.jwt-part.pay{background:var(--green-dim);border-left:2px solid var(--green)}
.jwt-part.sig{background:var(--purple-dim);border-left:2px solid var(--purple)}
.jwt-part .jp-label{font-size:7px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px}
.jwt-part.hdr .jp-label{color:var(--blue)}
.jwt-part.pay .jp-label{color:var(--green)}
.jwt-part.sig .jp-label{color:var(--purple)}
.jwt-part .jp-field{display:flex;justify-content:space-between;padding:1px 0;gap:4px}
.jwt-part .jp-k{color:var(--tx3);flex-shrink:0}
.jwt-part .jp-v{color:var(--tx);font-weight:500;text-align:right;word-break:break-all}
.jwt-part .jp-v.cap{color:var(--cyan);font-size:7px}
.att-row{display:flex;align-items:center;gap:6px;font-size:9px;margin-top:6px}
.att-row .att-lbl{color:var(--tx3);white-space:nowrap}
.att-row .att-track{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.att-row .att-fill{height:100%;border-radius:2px;transition:width 0.5s var(--ease)}
.att-row .att-val{font-family:var(--mono);font-weight:600;min-width:14px;text-align:right}

.scan-result{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-top:4px}
.scan-result .sr-layers{display:flex;gap:6px;margin-bottom:6px}
.scan-result .sr-layer{flex:1;padding:6px;border-radius:var(--radius-xs);text-align:center;font-size:9px;font-weight:600}
.scan-result .sr-layer.pass{background:var(--green-dim);color:var(--green)}
.scan-result .sr-layer.fail{background:var(--red-dim);color:var(--red)}
.scan-result .sr-threats{font-size:9px;color:var(--tx3);font-family:var(--mono)}
.scan-result .sr-threat{padding:2px 0;color:var(--red)}

.risk-radar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-top:4px}
.risk-radar .rr-title{font-size:9px;font-weight:600;color:var(--tx3);margin-bottom:6px}
.risk-radar .rr-dims{display:flex;flex-direction:column;gap:4px}
.risk-radar .rr-dim{display:flex;align-items:center;gap:6px;font-size:9px}
.risk-radar .rr-dim .rd-name{width:60px;color:var(--tx3);flex-shrink:0}
.risk-radar .rr-dim .rd-bar{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.risk-radar .rr-dim .rd-fill{height:100%;border-radius:2px;transition:width 0.5s var(--ease)}
.risk-radar .rr-dim .rd-val{font-family:var(--mono);font-weight:500;min-width:24px;text-align:right;color:var(--tx2)}

.error-card{background:var(--red-dim);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);padding:8px 12px;margin-top:4px;font-size:10px}
.error-card .ec-code{font-family:var(--mono);font-weight:700;color:var(--red);font-size:11px}
.error-card .ec-msg{color:var(--tx2);margin-top:2px;font-size:10px}

.approval-card{background:var(--orange-dim);border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius-sm);padding:10px 12px;margin-top:4px}
.approval-card .ap-title{font-size:11px;font-weight:600;color:var(--orange)}
.approval-card .ap-desc{font-size:10px;color:var(--tx2);margin-top:2px}
.approval-card .ap-btns{display:flex;gap:6px;margin-top:8px}

.toolbar{flex-shrink:0;padding:12px 28px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 16px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s var(--ease);font-family:var(--font)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#2563eb;transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border2)}
.btn-ghost:disabled{opacity:0.3;cursor:not-allowed}
.btn-sm{padding:5px 12px;font-size:10px}
.btn-xs{padding:3px 8px;font-size:9px}
.toolbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.progress-bar{flex:1;max-width:200px;height:2px;background:var(--surface3);border-radius:1px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:1px;transition:width 0.4s var(--ease);width:0%}
.progress-text{font-size:10px;color:var(--tx3);min-width:100px}

.right-panel{width:320px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.rp-section{display:flex;flex-direction:column;overflow:hidden}
.rp-section+.rp-section{border-top:1px solid var(--border)}
.rp-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rp-header h3{font-size:11px;font-weight:700;letter-spacing:-0.01em}
.rp-header .rp-tag{font-size:8px;color:var(--tx3);padding:2px 6px;border-radius:100px;background:var(--surface2)}
.rp-body{flex:1;overflow-y:auto;padding:0 16px 12px;min-height:0}

.chain-canvas-wrap{width:100%;aspect-ratio:16/9;position:relative;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface2)}
.chain-canvas-wrap canvas{width:100%;height:100%;display:block}

.audit-entry{padding:6px 8px;border-radius:var(--radius-xs);margin-bottom:3px;cursor:pointer;transition:background 0.2s;border-left:2px solid transparent;font-size:9px}
.audit-entry:hover{background:var(--surface2)}
.audit-entry.log-allow{border-left-color:var(--green)}
.audit-entry.log-deny{border-left-color:var(--red)}
.audit-entry.log-alert{border-left-color:var(--orange)}
.audit-entry .ae-row{display:flex;align-items:center;gap:5px}
.audit-entry .ae-decision{font-weight:700;font-size:8px;letter-spacing:0.04em}
.audit-entry .ae-time{color:var(--tx4);font-family:var(--mono);font-size:8px}
.audit-entry .ae-agent{color:var(--tx3)}
.audit-entry .ae-action{color:var(--tx4)}
.audit-entry .ae-detail{margin-top:3px;padding:4px 6px;background:var(--surface2);border-radius:3px;font-size:8px;font-family:var(--mono);color:var(--tx4);display:none}
.audit-entry.expanded .ae-detail{display:block}

.metrics-row{display:flex;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.metric{display:flex;align-items:center;gap:4px;font-size:10px}
.metric .m-val{font-weight:700;font-family:var(--mono);font-size:12px}
.metric .m-lbl{color:var(--tx3);font-size:9px}
.metric .m-sep{width:1px;height:12px;background:var(--border);margin:0 4px}

.approval-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center}
.approval-overlay.show{display:flex}
.approval-modal{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;max-width:360px;width:90%;text-align:center;transform:scale(0.95);opacity:0;transition:all 0.3s var(--ease)}
.approval-overlay.show .approval-modal{transform:scale(1);opacity:1}
.approval-modal .am-icon{font-size:36px;margin-bottom:10px}
.approval-modal h3{font-size:15px;font-weight:700;margin-bottom:4px}
.approval-modal p{font-size:11px;color:var(--tx2);margin-bottom:4px}
.approval-modal .am-timer{font-size:10px;color:var(--orange);font-family:var(--mono);margin-bottom:14px}
.approval-modal .am-btns{display:flex;gap:8px;justify-content:center}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);padding:8px 20px;border-radius:100px;background:var(--surface2);border:1px solid var(--border2);font-size:11px;color:var(--tx);z-index:3000;transition:transform 0.4s var(--ease);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

.intro-overlay{position:fixed;inset:0;z-index:1500;background:rgba(9,9,11,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px}
.intro-overlay.show{display:flex}
.intro-overlay .io-icon{font-size:48px;margin-bottom:12px;animation:ioIn 0.5s var(--ease)}
@keyframes ioIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.intro-overlay h2{font-size:28px;font-weight:700;letter-spacing:-0.03em;margin-bottom:6px}
.intro-overlay p{font-size:13px;color:var(--tx2);max-width:440px;line-height:1.5}
.intro-overlay .io-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:600;margin-top:12px}

.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 16px 12px}
.feat-chip{padding:5px 8px;border-radius:var(--radius-xs);font-size:9px;font-weight:500;background:var(--surface2);color:var(--tx3);display:flex;align-items:center;gap:4px}
.feat-chip .fc-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:0.01ms!important}}
</style>
</head>
<body>

<div class="root">
<nav>
  <div class="brand"><b>Agent</b>Pass</div>
  <div class="nav-right">
    <div class="stat"><span class="status-dot on" id="health-dot"></span><span id="health-text">在线</span></div>
    <div class="stat">Token <span class="stat-val" id="nav-tokens">0</span></div>
    <div class="stat">拦截 <span class="stat-val" id="nav-deny" style="color:var(--red)">0</span></div>
    <div class="stat">审计链 <span class="stat-val" id="nav-chain" style="color:var(--green)">✓</span></div>
  </div>
</nav>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">演示场景</div>
      <div class="scenario-list" id="scenario-list"></div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto;min-height:0">
      <div class="sidebar-title">已注册 Agent</div>
      <div id="agent-cards"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">核心能力</div>
      <div class="features-grid">
        <div class="feat-chip"><span class="fc-dot" style="background:var(--blue)"></span>Agent Card</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--green)"></span>衰减 Token</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--red)"></span>特权检测</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--purple)"></span>注入防御</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--orange)"></span>人工审批</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--cyan)"></span>风险评分</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--green)"></span>mTLS 签名</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--blue)"></span>审计链</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--orange)"></span>行为基线</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--purple)"></span>最小权限</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--cyan)"></span>会话防走私</div>
        <div class="feat-chip"><span class="fc-dot" style="background:var(--red)"></span>熔断器</div>
      </div>
    </div>
  </div>

  <div class="center">
    <div class="stage">
      <div class="stage-inner">
        <div class="stage-header">
          <div>
            <h1 id="stage-title">正常委托流程</h1>
            <div class="stage-desc" id="stage-desc">用户请求生成报告 → DocAgent 解析意图 → 签发最小权限 Token → 委托 DataAgent → 返回数据 → 写入文档</div>
          </div>
          <div class="stage-badge" id="stage-badge" style="background:var(--green-dim);color:var(--green)">安全 · 合规</div>
        </div>

function connectWS(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{};
  ws.onmessage=(e)=>{try{handleWSMessage(JSON.parse(e.data))}catch(err){}};
  ws.onclose=()=>{setTimeout(connectWS,3000)};
  ws.onerror=()=>{};
  setInterval(()=>{if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'ping'}))},30000);
}

function handleWSMessage(msg){
  if(['token_issued','token_revoked','delegation_success','delegation_denied'].includes(msg.type))refreshMetrics();
  if(msg.type==='human_approval_required')showApprovalModal(msg.data);
  if(msg.type==='demo_step')handleDemoStep(msg.data);
  if(msg.type==='privilege_escalation')addAuditLog({decision:'ALERT',action_type:'privilege_escalation',requesting_agent:msg.data.agent_id,deny_reason:'特权升级检测'});
}

async function refreshMetrics(){
  try{
    const r=await fetch(`${API}/system/metrics`);
    const m=await r.json();
    activeTokens=m.tokens?.active||0;
    denyCount=m.audit?.deny_count||0;
    chainValid=m.audit_chain?.valid!==false;
    document.getElementById('nav-tokens').textContent=activeTokens;
    document.getElementById('nav-deny').textContent=denyCount;
    const ce=document.getElementById('nav-chain');
    ce.textContent=chainValid?'✓':'✗';
    ce.style.color=chainValid?'var(--green)':'var(--red)';
    document.getElementById('m-agents').textContent=m.agents?.total||0;
    document.getElementById('m-tokens').textContent=activeTokens;
    document.getElementById('m-deny').textContent=denyCount;
    const rv=Math.min(100,denyCount*15+(chainValid?0:50));
    const re=document.getElementById('m-risk');
    re.textContent=rv;
    re.style.color=rv<30?'var(--green)':rv<60?'var(--orange)':'var(--red)';
  }catch(e){}
}

async function loadAgents(){
  try{
    const r=await fetch(`${API}/agents`);
    const list=await r.json();
    agents={};
    list.forEach(a=>{agents[a.agent_id]=a});
    renderAgentCards();
    drawChainCanvas();
  }catch(e){}
}

function renderAgentCards(){
  const c=document.getElementById('agent-cards');
  c.innerHTML='';
  Object.entries(agents).forEach(([id,a])=>{
    const color=AGENT_COLORS[id]||'#3b82f6';
    const icon=AGENT_ICONS[id]||'🤖';
    const risk=a.risk_score||0;
    const riskColor=risk<30?'var(--green)':risk<60?'var(--orange)':'var(--red)';
    const d=document.createElement('div');
    d.className='agent-card';
    d.innerHTML=`
      <div class="ac-top">
        <div class="ac-icon" style="background:${color}22">${icon}</div>
        <div><div class="ac-name" style="color:${color}">${a.agent_name||id}</div><div class="ac-id">${id}</div></div>
      </div>
      <div class="ac-caps">${(a.capabilities||[]).map(c=>`<span class="ac-cap" style="background:${color}15;color:${color}">${c}</span>`).join('')}</div>
      <div class="ac-risk"><span style="color:var(--tx3)">风险</span><div class="risk-bar"><div class="risk-fill" style="width:${risk}%;background:${riskColor}"></div></div><span class="risk-val" style="color:${riskColor}">${risk.toFixed(0)}</span></div>`;

function renderScenarioList(){
  const c=document.getElementById('scenario-list');
  c.innerHTML='';
  Object.entries(SCENARIOS).forEach(([key,s])=>{
    const b=document.createElement('button');
    b.className='scenario-btn'+(key===currentScenario?' active':'');
    b.dataset.scenario=key;
    b.innerHTML=`<span class="s-icon">${s.icon}</span><div class="s-info"><span class="s-name">${s.title}</span><span class="s-desc">${s.desc.substring(0,30)}...</span></div>`;

function selectScenario(key){
  currentScenario=key;
  document.querySelectorAll('.scenario-btn').forEach(b=>b.classList.toggle('active',b.dataset.scenario===key));
  renderFlowSteps(key);
  const s=SCENARIOS[key];
  document.getElementById('stage-title').innerHTML=s.title.replace(/^(.+)(流程|拦截|防御|断路器|检测)$/,('<span class="hl">$1</span>$2'));
  document.getElementById('stage-desc').textContent=s.desc;
  const badge=document.getElementById('stage-badge');
  badge.textContent=s.badge;
  const dimMap={'var(--green)':'var(--green-dim)','var(--red)':'var(--red-dim)','var(--orange)':'var(--orange-dim)','var(--purple)':'var(--purple-dim)'};
  badge.style.background=dimMap[s.color]||'var(--blue-dim)';
  badge.style.color=s.color;

function renderFlowSteps(scenario){
  const s=SCENARIOS[scenario];
  if(!s)return;
  const c=document.getElementById('flow-steps');
  c.innerHTML='';
  flowStepEls=[];
  s.steps.forEach((step,i)=>{
    const d=document.createElement('div');
    d.className='flow-step';
    d.id=`fstep-${i}`;
    d.innerHTML=`
      <div class="step-line">
        <div class="step-dot"></div>
        ${i<s.steps.length-1?'<div class="step-connector"></div>':''}
      </div>
      <div class="step-content">
        <div class="step-title">${step.title}</div>
        <div class="step-desc">${step.desc}</div>
        <div class="step-detail" id="fdetail-${i}"></div>
      </div>`;
    c.appendChild(d);
    flowStepEls.push(d);
    setTimeout(()=>d.classList.add('visible'),50+i*60);
  });
}

function activateFlowStep(index,type){
  flowStepEls.forEach((el,i)=>{
    if(i<index){
      if(!el.classList.contains('success')&&!el.classList.contains('error')&&!el.classList.contains('warning'))
        el.classList.add('success');
      el.classList.remove('active');
    }else if(i===index){
      el.classList.remove('success','error','warning');
      el.classList.add(type||'active');
      el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  });
}

function setFlowStepResult(index,type){
  const el=flowStepEls[index];
  if(el){el.classList.remove('active');el.classList.add(type)}
}

function showIntro(scenario){

function buildTokenDetail(tokenData,statusText,statusType){
  if(!tokenData)return'';
  let displayData={};
  let accessToken='';
  if(tokenData.access_token){
    accessToken=tokenData.access_token;
    try{const parts=tokenData.access_token.split('.');if(parts.length>=2)displayData=JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')))}catch(e){displayData=tokenData}
  }else{displayData=tokenData}
  let html=`<div class="token-card"><div class="tc-status ${statusType}">${statusText}</div>`;
  try{
    const parts=accessToken.split('.');
    if(parts.length>=2){
      const header=JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
      html+=`<div class="jwt-parts"><div class="jwt-part hdr"><div class="jp-label">HEADER</div>`;
      Object.entries(header).forEach(([k,v])=>{html+=`<div class="jp-field"><span class="jp-k">${k}</span><span class="jp-v">${v}</span></div>`});
      html+=`</div><div class="jwt-part pay"><div class="jp-label">PAYLOAD</div>`;
      Object.entries(displayData).forEach(([k,v])=>{
        if(k==='capabilities'&&Array.isArray(v))html+=`<div class="jp-field"><span class="jp-k">${k}</span><span class="jp-v cap">${v.join(', ')}</span></div>`;
        else html+=`<div class="jp-field"><span class="jp-k">${k}</span><span class="jp-v">${String(v).substring(0,30)}</span></div>`;
      });
      html+=`</div><div class="jwt-part sig"><div class="jp-label">SIGNATURE</div><div class="jp-field"><span class="jp-k">RSA-256</span><span class="jp-v">${parts[2]?parts[2].substring(0,16)+'...':'N/A'}</span></div></div></div>`;
    }
  }catch(e){html+=`<div style="font-size:9px;color:var(--tx3)">Token 解析失败</div>`}
  const attLevel=displayData.attenuation_level??tokenData.attenuation_level??0;
  const pct=Math.max(10,100-attLevel*25);
  const attColor=attLevel===0?'var(--green)':attLevel===1?'var(--blue)':attLevel===2?'var(--orange)':'var(--red)';
  html+=`<div class="att-row"><span class="att-lbl">衰减层级</span><div class="att-track"><div class="att-fill" style="width:${pct}%;background:${attColor}"></div></div><span class="att-val" style="color:${attColor}">${attLevel}</span></div>`;
  html+=`</div>`;
  return html;
}

function buildScanDetail(scanResult){
  if(!scanResult)return'';
  const layers=scanResult.layers||{};
  const threats=scanResult.threats||[];
  let html=`<div class="scan-result"><div class="sr-layers">`;
  html+=`<div class="sr-layer ${layers.keyword_regex?'fail':'pass'}">关键词/正则 ${layers.keyword_regex?'⚠ 拦截':'✓ 通过'}</div>`;
  html+=`<div class="sr-layer ${layers.semantic_rules?'fail':'pass'}">语义规则 ${layers.semantic_rules?'⚠ 拦截':'✓ 通过'}</div>`;
  html+=`</div>`;
  if(threats.length){html+=`<div class="sr-threats">${threats.map(t=>`<div class="sr-threat">[${t.severity}] ${t.type}: ${t.matched_text}</div>`).join('')}</div>`}
  html+=`</div>`;
  return html;
}

function buildRiskDetail(riskData){
  if(!riskData||!riskData.dimensions)return'';
  const dims=riskData.dimensions;
  const labels={request_frequency:'请求频率',chain_depth:'链深度',time_period:'时间窗口',capability_combo:'能力组合',history_violations:'违规历史'};
  let html=`<div class="risk-radar"><div class="rr-title">风险评分五维度分析</div><div class="rr-dims">`;
  Object.entries(dims).forEach(([k,v])=>{
    const c=v<30?'var(--green)':v<60?'var(--orange)':'var(--red)';
    html+=`<div class="rr-dim"><span class="rd-name">${labels[k]||k}</span><div class="rd-bar"><div class="rd-fill" style="width:${v}%;background:${c}"></div></div><span class="rd-val" style="color:${c}">${v.toFixed(0)}</span></div>`;
  });
  html+=`</div></div>`;
  return html;
}

function buildErrorDetail(code,msg){
  return`<div class="error-card"><div class="ec-code">${code}</div><div class="ec-msg">${msg}</div></div>`;
}

function buildApprovalDetail(taskId,caps){
  return`<div class="approval-card"><div class="ap-title">⏳ PENDING_HUMAN_APPROVAL</div><div class="ap-desc">请求能力: ${(caps||[]).join(', ')}</div><div class="ap-btns"><button class="btn btn-primary btn-xs" onclick="resolveApproval(true)">✓ 批准</button><button class="btn btn-ghost btn-xs" style="border-color:var(--red);color:var(--red)" onclick="resolveApproval(false)">✗ 拒绝</button></div></div>`;
}

function handleDemoStep(step){
  const idx=step.step-1;
  if(idx<0||idx>=flowStepEls.length)return;
  const detailEl=document.getElementById(`fdetail-${idx}`);
  if(!detailEl)return;
  let detailHtml='';

  if(step.token){
    const statusMap={
      'token_issue':['Token 已签发','issued'],
      'search_token':['SearchAgent Token 已签发','issued'],
      'sensitive_request':['DocAgent Token 已签发','issued'],
      'token_stolen':['Token 已被盗用','stolen'],
      'verify_attempt':['盗用 Token 尝试验证','warning'],
    };
    const [st,sc]=statusMap[step.action]||['Token','issued'];
    detailHtml+=buildTokenDetail(step.token,st,sc);
  }

  if(step.action==='mtls_verify'&&step.delegation&&step.delegation.access_token){
    detailHtml+=buildTokenDetail(step.delegation,'委托 Token 已签发 (衰减 +1)','issued');
  }

  if(step.action==='injection_scan'&&step.scan_result){
    detailHtml+=buildScanDetail(step.scan_result);
  }

  if(step.action==='injection_blocked'){
    detailHtml+=buildErrorDetail('PROMPT_INJECTION_BLOCKED','三层检测全部触发，注入攻击已拦截');
  }

  if(step.action==='capability_denied'||step.action==='delegation_error'){
    detailHtml+=buildErrorDetail('ERR_DELEGATION_DENIED',step.error||'能力不匹配，委托被拒绝');
  }

  if(step.action==='escalation_detected'){
    detailHtml+=buildErrorDetail('ERR_PRIVILEGE_ESCALATION',step.error||'请求能力超出注册基线');
  }

  if(step.action==='verify_failed'){
    detailHtml+=buildErrorDetail('ERR_IDENTITY_UNVERIFIABLE','mTLS 签名验证失败，身份无法确认');
  }

  if(step.action==='risk_upgrade'&&step.risk_score!==undefined){
    detailHtml+=buildRiskDetail({dimensions:{request_frequency:step.risk_score*0.8,chain_depth:step.risk_score*0.3,time_period:10,capability_combo:step.risk_score*0.6,history_violations:step.risk_score*0.9}});
  }

  if(step.action==='approval_required'||step.action==='approval_popup'){
    detailHtml+=buildApprovalDetail(step.task_id,step.requested_capabilities);
  }

  if(step.action==='approval_result'&&step.delegation&&step.delegation.access_token){
    detailHtml+=buildTokenDetail(step.delegation,'审批通过 — 受限 Token 已签发','issued');
  }

  if(step.action==='delegated'&&step.delegation&&step.delegation.access_token){
    detailHtml+=buildTokenDetail(step.delegation,'委托成功','issued');
  }

  if(step.action==='tokens_revoked'){
    detailHtml+=buildErrorDetail('ALL_TOKENS_REVOKED','该 Agent 所有活跃 Token 已被撤销');
  }

  if(detailHtml)detailEl.innerHTML=detailHtml;

  if(step.action==='token_issue'||step.action==='search_token'||step.action==='sensitive_request'){
    const aid=step.token?.agent_id||(step.token?.access_token?parseJWTAgent(step.token.access_token):'agent_doc_001');
    startCanvasAnimation(null,aid,[aid]);
  }
  if(step.action==='delegation_start')startCanvasAnimation({'agent_doc_001->agent_data_001':'green'},'agent_doc_001',['agent_doc_001','agent_data_001']);
  if(step.action==='mtls_verify'||step.action==='delegation_success')startCanvasAnimation({'agent_doc_001->agent_data_001':'green'},'agent_data_001',['agent_data_001']);
  if(step.action==='capability_denied'||step.action==='delegation_error')startCanvasAnimation({'agent_doc_001->agent_data_001':'red'},null,[]);
  if(step.action==='token_stolen')startCanvasAnimation({'agent_doc_001->agent_data_001':'purple'},null,[]);
  if(step.action==='escalation_attempt'||step.action==='escalation_detected')startCanvasAnimation(null,'agent_search_001',['agent_search_001']);
  if(step.action==='approval_required'||step.action==='approval_popup')startCanvasAnimation({'agent_doc_001->agent_data_001':'yellow'},null,['agent_doc_001','agent_data_001']);

  if(step.action==='injection_blocked')addAuditLog({decision:'DENY',action_type:'injection_blocked',requesting_agent:'agent_doc_001',deny_reason:'Prompt injection detected and blocked'});
  if(step.action==='escalation_detected')addAuditLog({decision:'ALERT',action_type:'privilege_escalation_detected',requesting_agent:'agent_search_001',deny_reason:step.error||'Privilege escalation'});
  if(step.action==='verify_failed')addAuditLog({decision:'DENY',action_type:'token_verify',requesting_agent:'agent_data_001',deny_reason:'mTLS signature verification failed'});
}

function parseJWTAgent(token){
  try{const parts=token.split('.');if(parts.length>=2){const p=JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));return p.agent_id||''}}catch(e){}
  return'';
}

function drawChainCanvas(edgeHighlights,activeNodeId,pulseNodes){
  const canvas=document.getElementById('chain-canvas');
  const wrap=canvas.parentElement;
  const rect=wrap.getBoundingClientRect();
  if(rect.width<10||rect.height<10){setTimeout(()=>drawChainCanvas(edgeHighlights,activeNodeId,pulseNodes),200);return}
  const dpr=window.devicePixelRatio||1;
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const w=rect.width,h=rect.height;ctx.clearRect(0,0,w,h);
  const cx=w/2,cy=h/2,radius=Math.min(w,h)*0.3;
  const nodePositions={
    'agent_doc_001':{x:cx-radius*0.9,y:cy-radius*0.4},
    'agent_data_001':{x:cx+radius*0.9,y:cy-radius*0.4},
    'agent_search_001':{x:cx,y:cy+radius*0.8},
  };
  const edges=[{from:'agent_doc_001',to:'agent_data_001',label:'delegate'},{from:'agent_doc_001',to:'agent_search_001',label:'delegate'}];
  edges.forEach(edge=>{
    const from=nodePositions[edge.from],to=nodePositions[edge.to];
    if(!from||!to)return;
    let color='rgba(255,255,255,0.04)',width=1,glow=false;
    if(edgeHighlights){
      const key=`${edge.from}->${edge.to}`;
      const ec=edgeHighlights[key];
      if(ec==='green'){color='rgba(34,197,94,0.7)';width=2;glow=true}
      else if(ec==='red'){color='rgba(239,68,68,0.7)';width=2;glow=true}
      else if(ec==='yellow'){color='rgba(245,158,11,0.7)';width=2;glow=true}
      else if(ec==='purple'){color='rgba(168,85,247,0.7)';width=2;glow=true}
    }
    if(glow){ctx.save();ctx.shadowColor=color;ctx.shadowBlur=10}
    const cpx=(from.x+to.x)/2,cpy=(from.y+to.y)/2-20;
    ctx.beginPath();ctx.moveTo(from.x,from.y);ctx.quadraticCurveTo(cpx,cpy,to.x,to.y);
    ctx.strokeStyle=color;ctx.lineWidth=width;ctx.stroke();
    if(glow){
      const t=performance.now()/1000,pt=(t*0.5)%1;
      const px=(1-pt)*(1-pt)*from.x+2*(1-pt)*pt*cpx+pt*pt*to.x;
      const py=(1-pt)*(1-pt)*from.y+2*(1-pt)*pt*cpy+pt*pt*to.y;
      ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    }
    const mt=0.55,mx=(1-mt)*(1-mt)*from.x+2*(1-mt)*mt*cpx+mt*mt*to.x;
    const my=(1-mt)*(1-mt)*from.y+2*(1-mt)*mt*cpy+mt*mt*to.y;
    const dx=2*(1-mt)*(cpx-from.x)+2*mt*(to.x-cpx),dy=2*(1-mt)*(cpy-from.y)+2*mt*(to.y-cpx);
    const angle=Math.atan2(dy,dx);
    ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx-6*Math.cos(angle-0.4),my-6*Math.sin(angle-0.4));
    ctx.moveTo(mx,my);ctx.lineTo(mx-6*Math.cos(angle+0.4),my-6*Math.sin(angle+0.4));
    ctx.strokeStyle=color;ctx.lineWidth=width;ctx.stroke();
    if(glow)ctx.restore();
  });
  Object.entries(nodePositions).forEach(([id,pos])=>{
    const agent=agents[id]||{};
    const color=AGENT_COLORS[id]||'#3b82f6';
    const name=AGENT_NAMES[id]||id;
    const nodeR=Math.min(24,Math.max(16,w*0.04));
    const isActive=activeNodeId===id;
    const isPulse=pulseNodes&&pulseNodes.includes(id);
    if(isPulse){const pr=nodeR+8+Math.sin(performance.now()/300)*3;ctx.beginPath();ctx.arc(pos.x,pos.y,pr,0,Math.PI*2);ctx.fillStyle=color+'10';ctx.fill()}
    ctx.beginPath();ctx.arc(pos.x,pos.y,nodeR,0,Math.PI*2);
    const grad=ctx.createRadialGradient(pos.x-nodeR*0.3,pos.y-nodeR*0.3,0,pos.x,pos.y,nodeR);
    grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'0d');
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle=isActive?color:color+'44';ctx.lineWidth=isActive?2:1;
    if(isActive){ctx.shadowColor=color;ctx.shadowBlur=10}
    ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font=`700 ${Math.max(7,nodeR*0.32)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(name,pos.x,pos.y);
  });
}

function startCanvasAnimation(edgeHighlights,activeNodeId,pulseNodes){
  if(animationFrameId)cancelAnimationFrame(animationFrameId);
  function loop(){drawChainCanvas(edgeHighlights,activeNodeId,pulseNodes);animationFrameId=requestAnimationFrame(loop)}
  loop();
}
function stopCanvasAnimation(){if(animationFrameId){cancelAnimationFrame(animationFrameId);animationFrameId=null}drawChainCanvas()}

function addAuditLog(log){
  const stream=document.getElementById('audit-stream');
  const div=document.createElement('div');
  const decision=(log.decision||'ALLOW').toUpperCase();
  let cls='log-allow',color='var(--green)';
  if(decision==='DENY'){cls='log-deny';color='var(--red)'}
  else if(decision==='ALERT'){cls='log-alert';color='var(--orange)'}
  const time=log.timestamp?new Date(log.timestamp*1000).toLocaleTimeString():new Date().toLocaleTimeString();
  div.className=`audit-entry ${cls}`;
  div.style.cssText='opacity:0;transform:translateY(-4px);transition:opacity 0.25s,transform 0.25s';
  div.innerHTML=`<div class="ae-row"><span class="ae-decision" style="color:${color}">${decision}</span><span class="ae-time">${time}</span><span class="ae-agent">${log.requesting_agent||'system'}</span><span class="ae-action">${log.action_type||''}</span></div>${log.deny_reason?`<div style="font-size:8px;color:var(--tx4);margin-top:2px">${log.deny_reason}</div>`:''}`;
  div.onclick=()=>div.classList.toggle('expanded');
  stream.insertBefore(div,stream.firstChild);
  requestAnimationFrame(()=>{div.style.opacity='1';div.style.transform='translateY(0)'});
  if(stream.children.length>40)stream.removeChild(stream.lastChild);
}

async function loadAuditLogs(){
  try{
    const r=await fetch(`${API}/audit/logs?limit=15`);
    const logs=await r.json();
    const stream=document.getElementById('audit-stream');
    stream.innerHTML='';
    logs.reverse().forEach(log=>addAuditLog(log));
  }catch(e){}
}

async function runDemo(scenario){
  if(demoRunning)return;
  demoRunning=true;
  currentScenario=scenario;
  document.querySelectorAll('.scenario-btn').forEach(b=>b.classList.toggle('active',b.dataset.scenario===scenario));
  selectScenario(scenario);
  document.getElementById('btn-run').disabled=true;
  document.getElementById('btn-run-all').disabled=true;
  await showIntro(scenario);
  renderFlowSteps(scenario);
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('progress-text').textContent='执行中...';
  let narrativeIdx=0;
  try{
    const resp=await fetch(`${API}/demo/${scenario}`,{method:'POST'});
    const result=await resp.json();
    if(result.steps&&result.steps.length>0){
      const total=result.steps.length;
      for(let i=0;i<total;i++){
        const step=result.steps[i];
        const stepType=mapStepType(step.action);
        activateFlowStep(narrativeIdx,stepType==='error'?'warning':'active');
        handleDemoStep(step);
        document.getElementById('progress-fill').style.width=`${((i+1)/total)*100}%`;
        document.getElementById('progress-text').textContent=step.description||`步骤 ${i+1}/${total}`;
        if(stepType==='error')setFlowStepResult(narrativeIdx,'error');
        else if(stepType==='success')setFlowStepResult(narrativeIdx,'success');
        else setFlowStepResult(narrativeIdx,'success');
        narrativeIdx++;
        await sleep(600);
      }
    }
    document.getElementById('progress-fill').style.width='100%';
    document.getElementById('progress-text').textContent='✓ 完成';
    showToast(`✓ ${SCENARIOS[scenario]?.title||scenario} 完成`);
  }catch(e){
    document.getElementById('progress-text').textContent='错误';
    showToast('演示执行失败');
  }
  stopCanvasAnimation();
  setTimeout(()=>{
    demoRunning=false;
    document.getElementById('btn-run').disabled=false;
    document.getElementById('btn-run-all').disabled=false;
    loadAuditLogs();refreshMetrics();loadAgents();
  },600);
}

function mapStepType(action){
  if(!action)return'active';
  if(action.includes('error')||action.includes('denied')||action.includes('failed')||action.includes('blocked')||action.includes('escalation_detected'))return'error';
  if(action.includes('success')||action.includes('doc_write')||action.includes('feishu_api'))return'success';
  if(action.includes('warning')||action.includes('risk')||action.includes('approval'))return'warning';
  return'active';
}

function runCurrentDemo(){runDemo(currentScenario)}
async function runAllDemos(){
  if(demoRunning)return;
  const order=['normal-delegation','capability-mismatch','token-theft','injection-defense','human-approval','privilege-escalation'];
  for(const s of order){await runDemo(s);await sleep(1000)}
  showToast('✓ 全部演示完成！');
}
function resetDemo(){
  stopCanvasAnimation();
  renderFlowSteps(currentScenario);
  document.getElementById('audit-stream').innerHTML='';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('progress-text').textContent='就绪';
  drawChainCanvas();loadAuditLogs();showToast('已重置');
}

function showApprovalModal(data){
  currentApprovalTaskId=data.task_id;
  const o=document.getElementById('approval-overlay');
  o.classList.add('show');
  document.getElementById('approval-desc').textContent=`${data.requesting_agent} → ${data.target_agent}: ${data.requested_capability}`;
  let remaining=data.timeout_seconds||30;
  const te=document.getElementById('approval-timer');
  te.textContent=`剩余 ${remaining} 秒`;
  if(approvalTimer)clearInterval(approvalTimer);
  approvalTimer=setInterval(()=>{remaining--;te.textContent=`剩余 ${remaining} 秒`;if(remaining<=0){clearInterval(approvalTimer);resolveApproval(false)}},1000);
}

async function resolveApproval(approved){
  if(approvalTimer)clearInterval(approvalTimer);
  document.getElementById('approval-overlay').classList.remove('show');
  if(currentApprovalTaskId){
    try{await fetch(`${API}/approvals/${currentApprovalTaskId}/resolve`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approved})})}catch(e){}
    currentApprovalTaskId=null;
  }
  addAuditLog({decision:approved?'ALLOW':'DENY',action_type:'human_approval_result',requesting_agent:'operator',deny_reason:approved?'':'Human approval rejected'});
  showToast(approved?'✓ 审批已通过':'✗ 审批已拒绝');
  refreshMetrics();loadAuditLogs();
}

async function exportReport(){
  try{const r=await fetch(`${API}/export/demo-report`,{method:'POST'});const result=await r.json();if(result.status==='success')showToast(`📄 报告已生成: ${result.filename}`)}catch(e){showToast('导出失败')}
}
async function verifyChain(){
  try{const r=await fetch(`${API}/audit/verify`);const result=await r.json();showToast(result.valid?'✓ 审计链完整':'✗ 审计链断裂')}catch(e){showToast('验证失败')}
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

document.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();runCurrentDemo()}
  if(e.code==='KeyR'){e.preventDefault();resetDemo()}
  if(e.code==='KeyA'){e.preventDefault();runAllDemos()}
  const numKeys={'Digit1':'normal-delegation','Digit2':'capability-mismatch','Digit3':'token-theft','Digit4':'injection-defense','Digit5':'human-approval','Digit6':'privilege-escalation'};
  if(numKeys[e.code]){selectScenario(numKeys[e.code])}
});

function init(){
  connectWS();renderScenarioList();loadAgents();refreshMetrics();loadAuditLogs();
  selectScenario('normal-delegation');
  renderFlowSteps('normal-delegation');
  setInterval(refreshMetrics,5000);
  setInterval(loadAuditLogs,10000);
  setInterval(()=>loadAgents(),15000);
  window.addEventListener('resize',()=>{if(!animationFrameId)drawChainCanvas()});
}
init();
</script>
